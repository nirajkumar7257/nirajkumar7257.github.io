<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरा पोर्टफोलियो</title>
    <!-- सोशल मीडिया आइकन्स के लिए लाइब्रेरी -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- बैकग्राउंड म्यूजिक टैग (अपनी ऑडियो फ़ाइल का नाम यहाँ बदलें) -->
    <audio id="bgMusic" src="mysong.mp3" loop></audio>

    <!-- 1. पहला स्क्रीन (Landing Page) -->
    <div id="welcomeScreen" class="welcome-screen">
        <h1 class="bg-name">comeback</h1>
        <button id="enterBtn" class="enter-btn">ENTER EXPERIENCE</button>
    </div>

    <!-- 2. दूसरा स्क्रीन (Main Portfolio) -->
    <div id="mainScreen" class="main-screen hidden">
        <!-- बैकग्राउंड में गिरती हुई लाइन्स का कोड -->
        <div class="background-lines">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>

        <!-- प्रोफाइल फोटो -->
        <div class="my-pic.jpg"></div>
        
        <h1 class="greeting">HI, I'M Niraj</h1>
        
        <!-- टाइपिंग एनिमेशन टेक्स्ट -->
        <div class="typing-container">
            <p class="typing-text">I am a Web Developer</p>
        </div>
        
        <p class="bio">
            मैं एक पैशनेट सेल्फ-टॉट डेवलपर हूँ। मुझे क्रिएटिव डिजिटल एक्सपीरियंस, वेबसाइट्स और ऐप्स बनाना बहुत पसंद है।
        </p>

        <!-- सोशल मीडिया बटन्स (अपने असली लिंक्स '#' की जगह डालें) -->
        <div class="social-links">
            <a href="https://t.me/Sangeet_Stream" target="_blank" class="icon"><i class="fab fa-telegram-plane"></i></a>
            <a href="#" target="_blank" class="icon"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/comeback_yadav?igsh=N2d2bXN3cWFudzFp" target="_blank" class="icon"><i class="fab fa-instagram"></i></a>
        </div>

        <!-- साउंड ऑन/ऑफ बटन -->
        <button id="soundBtn" class="sound-btn">
            <i class="fas fa-volume-mute" id="soundIcon"></i> <span id="soundText">Sound OFF</span>
        </button>

        <!-- एक्सप्लोर मोर बटन -->
        <div>
            <button class="explore-btn">EXPLORE MORE</button>
        </div>
    </div>

    <!-- जावास्क्रिप्ट लॉजिक: स्क्रीन बदलने और साउंड कंट्रोल के लिए -->
    <script>
        const enterBtn = document.getElementById('enterBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainScreen = document.getElementById('mainScreen');
        
        const bgMusic = document.getElementById('bgMusic');
        const soundBtn = document.getElementById('soundBtn');
        const soundIcon = document.getElementById('soundIcon');
        const soundText = document.getElementById('soundText');

        let isPlaying = false;

        // बटन क्लिक करने पर पहला पेज छुपाएं और दूसरा दिखाएं
        enterBtn.addEventListener('click', () => {
            welcomeScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            
            // ऑटोमैटिक म्यूजिक चालू करने का प्रयास
            bgMusic.play().then(() => {
                isPlaying = true;
                updateSoundButton();
            }).catch(err => console.log("ऑटोप्ले ब्लॉक हुआ। यूजर मैन्युअली ऑन कर सकता है।"));
        });

        // साउंड बटन पर क्लिक करने का लॉजिक
        soundBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                isPlaying = false;
            } else {
                bgMusic.play();
                isPlaying = true;
            }
            updateSoundButton();
        });

        // बटन का रूप अपडेट करने का फंक्शन
        function updateSoundButton() {
            if (isPlaying) {
                soundIcon.className = "fas fa-volume-up";
                soundText.innerText = "Sound ON";
                soundBtn.classList.add('active-sound');
            } else {
                soundIcon.className = "fas fa-volume-mute";
                soundText.innerText = "Sound OFF";
                soundBtn.classList.remove('active-sound');
            }
        }
    </script>

</body>
</html>
